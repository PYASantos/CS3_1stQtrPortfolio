<script>

let mlpCollection = {

  pinkie: { name: 'pinkie pie', color: 'pink', tribe: 'earth pony' },

};

// 3. update existing entry

collection['rainbow'].color = 'red'; // mane color
localStorage.setItem('mlpCollection', JSON.stringify(collection));

// delete a character 
delete collection['twilight'];
