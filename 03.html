<form onsubmit = "return greet();" onreset = "clearForm()">
    <label> Name <input type = "text" name = "names" id = "userName"> <input type = "submit"> <input type = "reset"></label>
<script>
    function greet() {
        addEventListener("submit", event => {
            event.preventDefault();
            const name = document.querySelector("#userName").value;
            alert("Hello, " + name + "!");
        });
    }
</script>
