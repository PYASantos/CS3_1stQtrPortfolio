<!DOCTYPE html>
<html>
<form name="userForm" autocomplete="on" novalidate target="_blank">
  <!-- name="userForm" → identifies THIS form (like id for forms) -->
  <!-- autocomplete="on" → browser remembers/suggests past values -->
  <!-- novalidate → disables browser's built-in error checking -->
  <!-- target="_blank" → opens results in NEW tab after submit -->
  
  <fieldset disabled>
    <!-- fieldset with disabled → ALL inputs inside DISABLED (grayed out) -->
    
    <label for="name">Name:</label>
    <input id="name" name="username" type="text" placeholder="John Doe">
    <!-- Can't type here! disabled from fieldset -->
    
    <label for="email">Email:</label>
    <input id="email" name="email" type="email" required>
    <!-- Can't type here either! -->
    
  </fieldset>
  
  <button type="submit">Submit</button>
  <!-- This button WORKS - not inside disabled fieldset -->
</form>
