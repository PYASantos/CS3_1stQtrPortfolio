<script>
let allOrders = []; //arrays 

const order = document.querySelector('orderform'); 
order.addEventListener(submit,function(event){

    event.preventDefault(); 

    const name = document.querySelector('#name').value;
    const amt = document.querySelector('#amt').value;

    console.log('Order placed by ' + name + ' for ' + amt + ' items.');

    //objects 
    let newOrder = {
        customer: name, 
        amount: amt, 
        status: 'pending'
    }

    allOrders.push(newOrder);
}); 
let string = JSON.stringify(allOrders)
let orderlist = localStorage.setItem('allOrders', string); 
let orderlist2 = localStorage.getItem('allOrders');

const retrievedOrders = JSON.parse(orderlist2);
console.log('data retrieved ' + retrievedOrders);

//phone accessibility (media query)

</script>
