<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complete Forms Demo - Fixed</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f9f9f9;
    }
    
    fieldset {
      border: 2px solid #ddd;
      border-radius: 10px;
      margin: 20px 0;
      padding: 20px;
      background-color: white;
    }
    
    fieldset:focus-within {
      border: 2px solid pink;
      box-shadow: white 0px 0px 5px, pink 0px 0px 10px;
      background-color: rgb(253, 255, 231);
    }
    
    legend {
      color: pink;
      font-weight: bold;
      padding: 0 10px;
      font-size: 18px;
    }
    
    label {
      display: block;
      margin: 10px 0;
      font-weight: bold;
      color: #333;
    }
    
    input:focus, select:focus {
      border: 2px solid #b9c0f2;
      box-shadow: 0 0 5px #e3fecf;
      background-color: #fff2f2;
      outline: none;
    }
    
    input[type="number"]:focus {
      width: 200px;
      border: 2px solid #ffcde1;
      box-shadow: 0 0 5px #d5fff2;
      background-color: #fff4b0;
    }
    
    input[type="submit"], input[type="reset"], button {
      padding: 10px 20px;
      background-color: pink;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      margin: 5px;
    }
    
    input[type="submit"]:hover, button:hover {
      background-color: #ffb6c1;
    }
    
    #greet {
      font-size: 24px;
      color: pink;
      text-align: center;
      margin: 20px 0;
      padding: 20px;
      background-color: honeydew;
      border-radius: 10px;
    }
    
    .demo-section {
      background-color: #f0f8ff;
      padding: 20px;
      margin: 20px 0;
      border-left: 5px solid pink;
    }
    
    .disabled-fieldset {
      opacity: 0.6;
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>

<!-- 1. GREETING FORM -->
<div class="demo-section">
  <h2>Greeting Form</h2>
  <form onsubmit="return greet();" onreset="clearForm()">
    <label>Name: 
      <input type="text" name="names" id="userName" required>
      <input type="submit" value="Greet">
      <input type="reset" value="Clear">
    </label>
  </form>
  <p id="greet">Greetings</p>
</div>

<!-- 2. PERSONAL IDENTIFICATION -->
<div class="demo-section">
  <h2>Personal Identification</h2>
  <fieldset>
    <legend>Student Info</legend>
    <label>Student ID: 
      <input type="number" id="studentid" required onfocus="wide()" onblur="checkEmpty()">
    </label><br>
    <label>Full Name: 
      <input type="text" id="fullname" required onfocus="wideName()" onblur="checkEmpty()">
    </label>
  </fieldset>
</div>

<!-- 3. FORM CONTROLS DEMO -->
<div class="demo-section">
  <h2>Form Controls Demo</h2>
  <form>
    <fieldset>
      <legend>Radio Buttons</legend>
      <label>Grade Level:
        <input type="radio" name="grade" value="grade7" checked> Grade 7
        <input type="radio" name="grade" value="grade8"> Grade 8
        <input type="radio" name="grade" value="grade9"> Grade 9
      </label>
    </fieldset>
    
    <fieldset>
      <legend>Checkboxes</legend>
      <label>Subjects:
        <input type="checkbox" name="subject" value="math" checked> Math
        <input type="checkbox" name="subject" value="science"> Science
        <input type="checkbox" name="subject" value="history"> History
      </label>
    </fieldset>
    
    <fieldset>
      <legend>Select Menu</legend>
      <label>Club: 
        <select name="club">
          <option value="likha">LIKHA</option>
          <option value="kislap">KISLAP</option>
          <option value="intyalë">INTYALË</option>
        </select>
      </label>
    </fieldset>
  </form>
</div>

<!-- 4. DISABLED FIELDSET DEMO -->
<div class="demo-section">
  <h2>Disabled Fieldset Demo</h2>
  <form name="userForm" autocomplete="on" novalidate target="_blank">
    <fieldset disabled class="disabled-fieldset">
      <legend>Disabled Fields (Can't Edit)</legend>
      <label for="name">Name:</label>
      <input id="name" name="username" type="text" placeholder="John Doe">
      
      <label for="email">Email:</label>
      <input id="email" name="email" type="email" required>
    </fieldset>
    <button type="submit">Submit (This Works!)</button>
  </form>
</div>

<!-- 5. LOCALSTORAGE DEMO -->
<div class="demo-section">
  <h2>LocalStorage Demo</h2>
  <button onclick="localStorageDemo()">Test LocalStorage CRUD</button>
  <div id="storageResult"></div>
</div>

<!-- 6. PRACTICE FORM WITH SAVE -->
<div class="demo-section">
  <h2>Practice Form (Saves to LocalStorage)</h2>
  <form id="practice" onsubmit="saveStudent(); return false;">
    <fieldset>
      <legend>Practice Form</legend>
      <label>Name: <input type="text" id="practiceName" required></label><br><br>
      <label>Email: <input type="email" id="practiceEmail" required></label><br><br>
      <label>Age: <input type="number" id="practiceAge" min="1" max="100" required></label><br><br>
    </fieldset>
    <button type="submit">Save Student</button>
  </form>
</div>

<script>
  // 1. Greeting functions
  function greet() {
    var name = document.getElementById("userName").value.trim();
    document.getElementById("greet").innerHTML = "Hello, " + name + "!";
    return false;
  }
  
  function clearForm() {
    document.getElementById("greet").innerHTML = "Greetings";
    document.getElementById("userName").value = "";
    alert("Form cleared!");
    return false;
  }
  
  // 2. Field functions
  function wide() {
    document.getElementById("studentid").style.width = "200px";
  }
  
  function wideName() {
    document.getElementById("fullname").style.width = "250px";
  }
  
  function checkEmpty() {
    const studentid = document.getElementById("studentid").value.trim();
    const fullname = document.getElementById("fullname").value.trim();
    if (!studentid || !fullname) {
      alert("Don't leave this empty!");
    }
  }
  
  // 5. LocalStorage CRUD Demo
  function localStorageDemo() {
    let mlpCollection = {
      twilight: { name: 'Twilight Sparkle', color: 'purple', tribe: 'alicorn' },
      pinkie: { name: 'Pinkie Pie', color: 'pink', tribe: 'earth pony' },
      rainbow: { name: 'Rainbow Dash', color: 'blue', tribe: 'pegasi' }
    };
    
    // CREATE
    localStorage.setItem('mlpCollection', JSON.stringify(mlpCollection));
    
    // READ
    let collection = JSON.parse(localStorage.getItem('mlpCollection') || '{}');
    document.getElementById('storageResult').innerHTML = 
      `<strong>Read:</strong> ${collection.rainbow.name}`;
    
    // UPDATE
    collection.rainbow.color = 'rainbow';
    localStorage.setItem('mlpCollection', JSON.stringify(collection));
    
    // DELETE
    delete collection.twilight;
    localStorage.setItem('mlpCollection', JSON.stringify(collection));
    
    document.getElementById('storageResult').innerHTML += 
      `<br><strong>After delete:</strong> ${JSON.stringify(collection)}`;
  }
  
  // 6. Practice form save
  function saveStudent() {
    const name = document.getElementById("practiceName").value.trim();
    const email = document.getElementById("practiceEmail").value.trim();
    const age = document.getElementById("practiceAge").value;
    
    let student = { name, email, age, timestamp: new Date().toLocaleString() };
    localStorage.setItem("student", JSON.stringify(student));
    
    alert("Student saved!\n" + JSON.stringify(student, null, 2));
  }
  
  // Load saved student on page load
  window.onload = function() {
    let saved = localStorage.getItem("student");
    if (saved) {
      let student = JSON.parse(saved);
      console.log("Saved student:", student);
    }
  }
</script>

</body>
</html>
