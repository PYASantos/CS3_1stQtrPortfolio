<div id="result">
          <script> 
            var  test = prompt("Enter a value: ");
            if (test == 0){
            localStorage.setItem(test, test); // creating data 
            document.getElementById("result").innerHTML = localStorage.getItem(test); // retrieving data 
            prompt(localStorage.length); // checking length of data
          }
          else if (test == 1){
            localStorage.setItem(test, test); // creating data
            localStorage.removeItem(test); // removing data
            document.getElementById("result").innerHTML = localStorage.getItem(test); // retrieving data
            prompt(localStorage.length); // checking length of data
          }
          else {
            localStorage.setItem(test,test); // creating data
            localStorage.clear(); // clearing all data
            document.getElementById("result").innerHTML = localStorage.getItem(test); // retrieving data
            prompt(localStorage.length); // checking length of data
          }
          </script>
</div>
